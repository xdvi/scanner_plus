name: Build Native Artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: build-native-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Android artifacts
        working-directory: packages/scanner_plus_rust_core/rust
        run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a --platform 21 build --release

      - name: Stage Android artifacts
        run: |
          mkdir -p prebuilt/aarch64-linux-android prebuilt/armv7-linux-androideabi
          cp packages/scanner_plus_rust_core/rust/target/aarch64-linux-android/release/librust_lib_scanner_plus_rust_core.so prebuilt/aarch64-linux-android/
          cp packages/scanner_plus_rust_core/rust/target/armv7-linux-androideabi/release/librust_lib_scanner_plus_rust_core.so prebuilt/armv7-linux-androideabi/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-android
          path: prebuilt/
          if-no-files-found: error

  linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libgtk-3-dev \
            ninja-build \
            pkg-config

      - name: Build Linux artifacts
        run: cargo build --manifest-path packages/scanner_plus_rust_core/rust/Cargo.toml --release --target x86_64-unknown-linux-gnu

      - name: Stage Linux artifacts
        run: |
          mkdir -p prebuilt/x86_64-unknown-linux-gnu
          cp packages/scanner_plus_rust_core/rust/target/x86_64-unknown-linux-gnu/release/librust_lib_scanner_plus_rust_core.so prebuilt/x86_64-unknown-linux-gnu/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-linux
          path: prebuilt/
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Windows artifacts
        run: cargo build --manifest-path packages/scanner_plus_rust_core/rust/Cargo.toml --release --target x86_64-pc-windows-msvc

      - name: Stage Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path prebuilt/x86_64-pc-windows-msvc | Out-Null
          Copy-Item packages/scanner_plus_rust_core/rust/target/x86_64-pc-windows-msvc/release/rust_lib_scanner_plus_rust_core.dll prebuilt/x86_64-pc-windows-msvc/
          Copy-Item packages/scanner_plus_rust_core/rust/target/x86_64-pc-windows-msvc/release/rust_lib_scanner_plus_rust_core.dll.lib prebuilt/x86_64-pc-windows-msvc/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-windows
          path: prebuilt/
          if-no-files-found: error

  darwin:
    name: Darwin
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin, aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios

      - name: Build Darwin artifacts
        run: |
          cargo build --manifest-path packages/scanner_plus_rust_core/rust/Cargo.toml --release --target x86_64-apple-darwin
          cargo build --manifest-path packages/scanner_plus_rust_core/rust/Cargo.toml --release --target aarch64-apple-darwin
          cargo build --manifest-path packages/scanner_plus_rust_core/rust/Cargo.toml --release --target aarch64-apple-ios
          cargo build --manifest-path packages/scanner_plus_rust_core/rust/Cargo.toml --release --target aarch64-apple-ios-sim
          cargo build --manifest-path packages/scanner_plus_rust_core/rust/Cargo.toml --release --target x86_64-apple-ios

      - name: Stage Darwin artifacts
        run: |
          mkdir -p \
            prebuilt/x86_64-apple-darwin \
            prebuilt/aarch64-apple-darwin \
            prebuilt/aarch64-apple-ios \
            prebuilt/aarch64-apple-ios-sim \
            prebuilt/x86_64-apple-ios
          cp packages/scanner_plus_rust_core/rust/target/x86_64-apple-darwin/release/librust_lib_scanner_plus_rust_core.a prebuilt/x86_64-apple-darwin/
          cp packages/scanner_plus_rust_core/rust/target/aarch64-apple-darwin/release/librust_lib_scanner_plus_rust_core.a prebuilt/aarch64-apple-darwin/
          cp packages/scanner_plus_rust_core/rust/target/aarch64-apple-ios/release/librust_lib_scanner_plus_rust_core.a prebuilt/aarch64-apple-ios/
          cp packages/scanner_plus_rust_core/rust/target/aarch64-apple-ios-sim/release/librust_lib_scanner_plus_rust_core.a prebuilt/aarch64-apple-ios-sim/
          cp packages/scanner_plus_rust_core/rust/target/x86_64-apple-ios/release/librust_lib_scanner_plus_rust_core.a prebuilt/x86_64-apple-ios/

      - name: Upload Darwin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-darwin
          path: prebuilt/
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [android, linux, windows, darwin]
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Ensure tag release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" || \
            gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" --title "${{ github.ref_name }}" --notes "Precompiled native binaries for version ${{ github.ref_name }}"

      - name: Flatten artifacts for publishing
        run: |
          mkdir -p publish
          cp -R downloaded-artifacts/prebuilt-android/. publish/
          cp -R downloaded-artifacts/prebuilt-linux/. publish/
          cp -R downloaded-artifacts/prebuilt-windows/. publish/
          cp -R downloaded-artifacts/prebuilt-darwin/. publish/

      - name: Compute crate hash
        env:
          CARGOKIT_TOOL_TEMP_DIR: ${{ runner.temp }}/cargokit-build-tool
        run: |
          MANIFEST_DIR="${{ github.workspace }}/packages/scanner_plus_rust_core/rust"
          sh "${{ github.workspace }}/cargokit/run_build_tool.sh" print-crate-hash --manifest-dir "$MANIFEST_DIR"

      - name: Publish precompiled artifacts
        env:
          CARGOKIT_TOOL_TEMP_DIR: ${{ runner.temp }}/cargokit-build-tool
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MANIFEST_DIR="${{ github.workspace }}/packages/scanner_plus_rust_core/rust"
          ARTIFACTS_DIR="${{ github.workspace }}/publish"
          sh "${{ github.workspace }}/cargokit/run_build_tool.sh" publish-precompiled-artifacts \
            --repository ${{ github.repository }} \
            --manifest-dir "$MANIFEST_DIR" \
            --artifacts-dir "$ARTIFACTS_DIR" \
            --target aarch64-linux-android \
            --target armv7-linux-androideabi \
            --target x86_64-unknown-linux-gnu \
            --target x86_64-pc-windows-msvc \
            --target x86_64-apple-darwin \
            --target aarch64-apple-darwin \
            --target aarch64-apple-ios \
            --target aarch64-apple-ios-sim \
            --target x86_64-apple-ios
