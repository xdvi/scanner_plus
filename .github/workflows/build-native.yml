name: Build Native Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi
      - name: Precompile Android binaries
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGOKIT_TOOL_TEMP_DIR: ${{ runner.temp }}/cargokit
        run: |
          sh cargokit/run_build_tool.sh precompile-binaries \
            --repository ${{ github.repository }} \
            --manifest-dir ${{ github.workspace }}/packages/scanner_plus_rust_core/rust \
            --target aarch64-linux-android \
            --target armv7-linux-androideabi

  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgtk-3-dev libudev-dev ninja-build pkg-config
      - name: Precompile Linux binaries
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGOKIT_TOOL_TEMP_DIR: ${{ runner.temp }}/cargokit
        run: |
          sh cargokit/run_build_tool.sh precompile-binaries \
            --repository ${{ github.repository }} \
            --manifest-dir ${{ github.workspace }}/packages/scanner_plus_rust_core/rust \
            --target x86_64-unknown-linux-gnu

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Precompile Windows binaries
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGOKIT_TOOL_TEMP_DIR: ${{ runner.temp }}\cargokit
        run: |
          sh cargokit/run_build_tool.sh precompile-binaries `
            --repository ${{ github.repository }} `
            --manifest-dir ${{ github.workspace }}/packages/scanner_plus_rust_core/rust `
            --target x86_64-pc-windows-msvc
        shell: pwsh

  darwin:
    name: Darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin, aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios
      - name: Precompile Darwin binaries
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGOKIT_TOOL_TEMP_DIR: ${{ runner.temp }}/cargokit
        run: |
          sh cargokit/run_build_tool.sh precompile-binaries \
            --repository ${{ github.repository }} \
            --manifest-dir ${{ github.workspace }}/packages/scanner_plus_rust_core/rust \
            --target x86_64-apple-darwin \
            --target aarch64-apple-darwin \
            --target aarch64-apple-ios \
            --target aarch64-apple-ios-sim \
            --target x86_64-apple-ios
