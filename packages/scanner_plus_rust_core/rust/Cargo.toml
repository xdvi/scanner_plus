[package]
name = "rust_lib_scanner_plus_rust_core"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
flutter_rust_bridge = "=2.12.0"
image = "0.25.10"
nokhwa = { version = "0.10.10", features = ["input-v4l", "input-msmf", "input-avfoundation", "usb_enumeration", "output-threaded"] }
zxing-cpp = "0.5.1"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
