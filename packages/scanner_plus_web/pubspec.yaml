name: scanner_plus_web
description: Web implementation of the scanner_plus plugin.
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  scanner_plus_platform_interface:
    path: ../scanner_plus_platform_interface
  scanner_plus_rust_core:
    path: ../scanner_plus_rust_core
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      web:
        pluginClass: ScannerPlusWeb
        fileName: scanner_plus_web.dart
